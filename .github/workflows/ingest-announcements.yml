name: ingest-announcements

on:
  schedule:
    - cron: "25 * * * *"   # hourly, off-the-hour
  workflow_dispatch:

concurrency:
  group: ingest-announcements
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        working-directory: ingestion
        run: |
          pip install -e .
          python -m playwright install --with-deps chromium

      - name: LUMA avisos
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          LUMA_OPERATOR_HOST: ${{ secrets.LUMA_OPERATOR_HOST }}
        run: python -m src.sources.luma_service_updates

      - name: Unverified social (Nitter, X API fallback)
        if: success() || failure()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SOCIAL_HANDLES: ${{ secrets.SOCIAL_HANDLES }}
        run: python -m src.sources.social_unverified

      - name: Extract outage events
        if: success() || failure()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.pipeline.outage_events

      - name: Restoration ETA heuristic
        if: success() || failure()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.pipeline.restoration_eta

      - name: Cause classifier heuristic
        if: success() || failure()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.pipeline.cause_classifier
