name: predict-outage

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min — inference only
    - cron: "0 6 * * 1"      # weekly Mon 06:00 UTC — try to train
  workflow_dispatch:

concurrency:
  group: predict-outage
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  predict:
    # skip predict on the weekly train tick; train job runs instead.
    if: github.event.schedule != '0 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        working-directory: ingestion
        run: pip install -e .[ml]

      # Backfill any new outage_events into outage_labels before inference so
      # the trainer (run weekly below) always sees the full label history.
      - name: Backfill labels
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.pipeline.backfill_outage_labels

      - name: Predict
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m ml.predict

  train:
    # weekly cron, manual dispatch, or push to main with a model change.
    # The trainer itself enforces the data-readiness gate; if there aren't
    # enough labels it exits non-zero and the heuristic stays in service.
    if: github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        working-directory: ingestion
        run: pip install -e .[ml]

      - name: Train
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m ml.train
