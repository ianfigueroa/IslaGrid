name: freshness-check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe /api/grid/status (merged snapshot age)
        env:
          BASE: ${{ secrets.APP_BASE_URL }}
        run: |
          if [ -z "$BASE" ]; then
            echo "APP_BASE_URL not set; nothing to probe yet."
            exit 0
          fi
          payload=$(curl -fsSL "$BASE/api/grid/status")
          echo "$payload"
          ts=$(echo "$payload" | python3 -c "import json,sys; d=json.load(sys.stdin); s=d.get('snapshot') or {}; print(s.get('ts') or '')")
          if [ -z "$ts" ]; then
            echo "::warning::No snapshot yet — pipeline may be cold-starting or upstream in maintenance."
            exit 0
          fi
          now=$(date -u +%s)
          then=$(date -u -d "$ts" +%s)
          age=$((now - then))
          echo "Snapshot age: ${age}s"
          if [ "$age" -gt 900 ]; then
            echo "::error::Snapshot is ${age}s old (> 15 min)."
            exit 1
          fi

      - name: Probe /api/grid/ingest-health (per-pipeline)
        env:
          BASE: ${{ secrets.APP_BASE_URL }}
        run: |
          if [ -z "$BASE" ]; then
            exit 0
          fi
          payload=$(curl -fsSL "$BASE/api/grid/ingest-health" || true)
          if [ -z "$payload" ]; then
            echo "::warning::ingest-health endpoint not reachable (likely a fresh deploy)."
            exit 0
          fi
          echo "$payload" | python3 -m json.tool || echo "$payload"
          # Fail loud if any pipeline is "stale" (older than 2x its cadence).
          # "lagging" and "missing" only warn — missing is normal for brand-new
          # tables or pipelines that haven't run yet on a cold environment.
          echo "$payload" | python3 - <<'PY'
          import json, sys
          data = json.loads(sys.stdin.read() or "{}")
          stale = [p for p in data.get("pipelines", []) if p.get("status") == "stale"]
          missing = [p for p in data.get("pipelines", []) if p.get("status") == "missing"]
          for p in missing:
              print(f"::warning::pipeline '{p['pipeline']}' has no rows yet (table {p['table']})")
          if stale:
              names = ", ".join(f"{p['pipeline']} ({p['age_seconds']}s)" for p in stale)
              print(f"::error::Stale pipelines: {names}")
              sys.exit(1)
          PY
