name: ingest-luma

on:
  # Every 5 minutes so the grid status pill and outage banner reflect the
  # genuine state on miluma.lumapr.com and genera-pr.com within a few minutes
  # — 15-min cadence made the UI feel "behind" against the source sites.
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: ingest-luma
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    # 15 min budget. A fresh Playwright install eats 90s and four scrapers
    # eat ~60s each; 10 min was cutting it close and one hung page killed
    # the merge step at the end. The cache below usually brings runtime
    # under 5 min, so this is headroom not a free-pass.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Playwright browser
        id: pw-cache
        uses: actions/cache@v4
        with:
          # Pin the cache key to the chromium version installed by our
          # Playwright pin; without that the cache is brittle to upstream
          # browser bumps. We re-resolve the version via the package
          # metadata so we don't have to hand-edit two files.
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install
        working-directory: ingestion
        run: |
          pip install -e .
          # Always ensure the browser binary is present. `playwright install`
          # is idempotent: it skips the download when the pinned chromium build
          # is already cached, so a cache hit stays fast. But it self-heals a
          # stale cache (e.g. after a Playwright bump changes the chromium build
          # number) instead of leaving a missing executable, which is what the
          # old cache-hit-only guard did. install-deps is the apt step, already
          # cached on the runner, so it stays near-instant.
          python -m playwright install-deps chromium
          python -m playwright install chromium

      - name: System Overview
        timeout-minutes: 3
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m src.sources.luma_system_overview

      - name: Planned Works
        timeout-minutes: 3
        if: success() || failure()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m src.sources.luma_planned_work

      - name: Genera PR generation
        timeout-minutes: 3
        if: success() || failure()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m src.sources.genera_pr

      - name: LUMA outage map (region counts)
        timeout-minutes: 2
        if: success() || failure()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          LUMA_OUTAGE_API_URL: ${{ secrets.LUMA_OUTAGE_API_URL }}
        run: python -m src.sources.luma_outage_map

      - name: BPS PDF (hourly only)
        timeout-minutes: 3
        if: github.event.schedule == null || endsWith(github.event.schedule, '0 * * * *')
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m src.sources.luma_bps_pdf

      # Must run LAST — merges the freshest LUMA + Genera rows into one
      # authoritative grid_snapshots row that /api/grid/status serves.
      # `if: always()` so a single hung upstream page (which is the common
      # failure mode) never blocks us from publishing a merged row from
      # whichever sources DID succeed.
      - name: Merge grid snapshot
        timeout-minutes: 2
        if: always()
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.pipeline.merge_grid
