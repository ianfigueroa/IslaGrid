name: aggregate-history

on:
  # Hourly so the /m/[id] reliability page picks up new outage events without
  # waiting for a daily batch. The job is idempotent so re-runs are safe.
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "How many days back to aggregate (1–400)"
        required: false
        default: "30"

concurrency:
  group: aggregate-history
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        working-directory: ingestion
        run: pip install -e .

      - name: Aggregate municipality outage rollup
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m src.pipeline.aggregate_municipality_daily \
            --backfill-days ${{ github.event.inputs.backfill_days || '30' }}
