name: aggregate-history

on:
  # Hourly so the /m/[id] reliability page picks up new outage events without
  # waiting for a daily batch. The job is idempotent so re-runs are safe.
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "How many days back to aggregate (1–400)"
        required: false
        default: "365"

concurrency:
  group: aggregate-history
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        working-directory: ingestion
        run: pip install -e .

      # Convert LUMA's region-level customer-affected snapshots into discrete
      # unplanned outage events so `outage_events` reflects real customer
      # outages (it used to contain only planned-work announcements).
      - name: Detect unplanned outage episodes from LUMA snapshots
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m src.pipeline.luma_snapshots_to_events \
            --backfill-days ${{ github.event.inputs.backfill_days || '365' }}

      - name: Aggregate municipality outage rollup
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # 365d default keeps the rolling year populated — the 31–365d window
        # used to silently drop to 0 hours because the hourly run only
        # touched the last 30 days.
        run: |
          python -m src.pipeline.aggregate_municipality_daily \
            --backfill-days ${{ github.event.inputs.backfill_days || '365' }}

      # Fill the ~50 munis that LUMA never publishes per-incident data for
      # by splitting region-level customer-out hours from
      # `luma_outage_snapshots` across each region's constituent munis.
      # Runs SECOND so real per-muni data (above) wins; the splitter skips
      # any (muni, day) that already has a row.
      - name: Region-split fill-in (silent munis)
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m src.pipeline.aggregate_luma_regions_to_munis \
            --backfill-days ${{ github.event.inputs.backfill_days || '365' }}
